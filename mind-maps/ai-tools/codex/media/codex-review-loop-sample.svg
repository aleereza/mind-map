<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex review loop</title>
  <desc id="desc">A simple flow showing scope, run, review, and accept in a loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="520" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Codex Review Loop</text>
  <text x="60" y="114" font-family="Arial, sans-serif" font-size="18" fill="#334155">Scope clearly, let the agent run, review the evidence, then iterate or accept.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="180" height="110" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <rect x="300" y="170" width="180" height="110" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <rect x="530" y="170" width="180" height="110" rx="22" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <rect x="760" y="170" width="140" height="110" rx="22" fill="#fae8ff" stroke="#a21caf" stroke-width="3"/>
  </g>

  <text x="160" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">1. Scope</text>
  <text x="160" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Goal</text>
  <text x="160" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Context</text>

  <text x="390" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">2. Let Run</text>
  <text x="390" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Reads</text>
  <text x="390" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Edits + tools</text>

  <text x="620" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#92400e">3. Review</text>
  <text x="620" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Diff</text>
  <text x="620" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Evidence</text>

  <text x="830" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#86198f">4. Decide</text>
  <text x="830" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Iterate</text>
  <text x="830" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">or commit</text>

  <path d="M250 225 H300" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M480 225 H530" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M710 225 H760" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M830 320 C830 405, 180 405, 160 300" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12" marker-end="url(#arrow)"/>

  <circle cx="160" cy="300" r="8" fill="#0f766e"/>
  <text x="540" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Feedback becomes the next, better-scoped task.</text>
</svg>
